<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTrail | Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body>
    <div id="navbar-mount"></div>

    <main class="container py-4" id="profile-page">
      <h1 class="h3 mb-3">Profile</h1>
      <p class="text-body-secondary">Update your profile photo.</p>

      <div class="card shadow-sm" style="max-width: 480px">
        <div class="card-body">
          <div class="d-flex align-items-center gap-3 mb-3">
            <img
              id="avatar-preview"
              src="https://placehold.co/96x96?text=Avatar"
              alt="Profile avatar preview"
              class="rounded-circle border"
              width="96"
              height="96"
              style="object-fit: cover"
            />
            <div>
              <div class="fw-semibold">Profile Photo</div>
              <small class="text-body-secondary">PNG, JPG, or WEBP</small>
            </div>
          </div>

          <form id="avatar-form" class="vstack gap-3">
            <div>
              <label class="form-label" for="avatar-file">Choose an image</label>
              <input
                class="form-control"
                type="file"
                id="avatar-file"
                accept="image/png,image/jpeg,image/webp"
              />
            </div>

            <div id="avatar-alert" class="alert d-none mb-0" role="alert"></div>

            <button id="avatar-submit" type="submit" class="btn btn-primary align-self-start">
              Upload Avatar
            </button>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="../src/pages/profile.js"></script>
  </body>
</html>
