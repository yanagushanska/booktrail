<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTrail | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../src/style.css" />
  </head>
  <body>
    <div id="navbar-mount"></div>

    <main class="container py-4" id="login-page">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <h1 class="h3 mb-3">Login</h1>
          <p class="text-body-secondary mb-4">Sign in to continue to your library.</p>

          <div id="login-alert" class="alert d-none" role="alert"></div>

          <form id="login-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="login-email">Email</label>
              <input
                id="login-email"
                class="form-control"
                type="email"
                name="email"
                autocomplete="email"
                required
              />
            </div>

            <div class="mb-4">
              <label class="form-label" for="login-password">Password</label>
              <input
                id="login-password"
                class="form-control"
                type="password"
                name="password"
                autocomplete="current-password"
                required
              />
            </div>

            <button id="login-submit" type="submit" class="btn btn-primary w-100">
              Sign in
            </button>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="../src/pages/login.js"></script>
  </body>
</html>
