<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTrail | Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../src/style.css" />
    <link rel="stylesheet" href="../src/styles/main.css" />
  </head>
  <body>
    <div id="navbar-mount"></div>

    <main class="container py-4" id="register-page">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <h1 class="h3 mb-3">Create account</h1>
          <p class="text-body-secondary mb-4">Sign up to start tracking your books.</p>

          <div id="register-alert" class="alert d-none" role="alert"></div>

          <form id="register-form" novalidate>
            <div class="mb-3">
              <label class="form-label" for="register-email">Email</label>
              <input
                id="register-email"
                class="form-control"
                type="email"
                name="email"
                autocomplete="email"
                required
              />
            </div>

            <div class="mb-4">
              <label class="form-label" for="register-password">Password</label>
              <input
                id="register-password"
                class="form-control"
                type="password"
                name="password"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>

            <button id="register-submit" type="submit" class="btn btn-primary w-100">
              Create account
            </button>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="../src/pages/register.js"></script>
  </body>
</html>
