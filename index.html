<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTrail | Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="navbar-mount"></div>

    <main class="container py-4" id="home-page">
      <div class="p-4 p-md-5 mb-4 rounded-3 bg-light border">
        <div class="col-lg-8 px-0">
          <h1 class="display-6 fw-semibold mb-3">Welcome to BookTrail</h1>
          <p class="lead mb-0">
            Track what you want to read, what you're reading now, and what you have finished.
          </p>
        </div>
      </div>

      <section aria-labelledby="catalog-heading">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
          <h2 id="catalog-heading" class="h4 mb-0">Browse Books</h2>
          <div class="w-100 w-md-50">
            <label class="form-label visually-hidden" for="book-search">Search books</label>
            <input
              id="book-search"
              type="text"
              class="form-control"
              placeholder="Search by title or author"
              autocomplete="off"
            />
          </div>
        </div>

        <div id="books-alert" class="alert d-none" role="alert"></div>

        <div id="book-grid" class="row g-3" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
