<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookTrail | Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div id="navbar-mount"></div>

    <main class="container py-4" id="home-page">
      <div class="p-4 p-md-5 mb-4 rounded-3 border hero-photo">
        <div class="col-lg-8 hero-copy">
          <h1 class="display-6 fw-semibold mb-3">Welcome to BookTrail</h1>
          <p class="lead mb-0">
            Track what you want to read, what you're reading now, and what you have finished.
          </p>
        </div>
      </div>

      <section id="home-add-book-section" class="card shadow-sm mb-4 d-none" style="max-width: 720px">
        <div class="card-body">
          <h2 class="h5 mb-3">Add Book (Admin)</h2>
          <div id="home-add-book-alert" class="alert d-none" role="alert"></div>

          <form id="home-add-book-form" class="vstack gap-3">
            <div>
              <label class="form-label" for="home-book-title">Title</label>
              <input class="form-control" id="home-book-title" type="text" required />
            </div>

            <div>
              <label class="form-label" for="home-book-author">Author</label>
              <input class="form-control" id="home-book-author" type="text" required />
            </div>

            <div>
              <label class="form-label" for="home-book-genre">Genre</label>
              <input class="form-control" id="home-book-genre" type="text" />
            </div>

            <div>
              <label class="form-label" for="home-book-description">Description</label>
              <textarea class="form-control" id="home-book-description" rows="3"></textarea>
            </div>

            <div>
              <label class="form-label" for="home-book-cover-file">Cover Image</label>
              <input
                class="form-control"
                id="home-book-cover-file"
                type="file"
                accept="image/png,image/jpeg,image/webp"
                required
              />
            </div>

            <img
              id="home-book-cover-preview"
              src="https://placehold.co/240x320?text=Cover+Preview"
              alt="Book cover preview"
              class="rounded border"
              width="240"
              height="320"
              style="object-fit: cover"
            />

            <button id="home-add-book-submit" type="submit" class="btn btn-primary align-self-start">
              Add Book
            </button>
          </form>
        </div>
      </section>

      <section aria-labelledby="catalog-heading">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
          <h2 id="catalog-heading" class="h4 mb-0">Browse Books</h2>
          <div class="w-100 w-md-50">
            <label class="form-label visually-hidden" for="book-search">Search books</label>
            <input
              id="book-search"
              type="text"
              class="form-control"
              placeholder="Search by title or author"
              autocomplete="off"
            />
          </div>
        </div>

        <div id="books-alert" class="alert d-none" role="alert"></div>

        <div id="book-grid" class="row g-3" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
